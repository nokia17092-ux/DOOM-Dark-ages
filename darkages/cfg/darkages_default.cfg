// ============================================================================
// DOOM: THE DARK AGES - Default Configuration
// Optimized for ThinkPad T460s (Intel HD 520) at 120+ FPS
// ============================================================================

// ============================================================================
// VIDEO SETTINGS (Optimized for Intel HD 520)
// ============================================================================

// Resolution and display
seta r_fullscreen "1"
seta r_vidMode "-1"
seta r_customWidth "1920"
seta r_customHeight "1080"
seta r_displayRefresh "120"
seta r_swapInterval "0"

// Dynamic resolution scaling (key for 120+ FPS)
seta r_dynamicResolution "1"
seta r_dynamicResMin "0.65"
seta r_dynamicResMax "1.0"
seta r_dynamicResTarget "120"

// Rendering
seta r_renderer "best"
seta r_multiSamples "0"
seta r_forceScreenWidthCentimeters "0"
seta r_gamma "1.1"
seta r_brightness "1.05"

// Shadows (reduced for performance on Intel HD)
seta r_shadows "1"
seta r_shadowMapSize "512"
seta r_maxShadowLights "2"
seta r_shadowDistance "512"
seta r_softShadows "0"
seta r_stencilShadows "0"

// Lighting (reduced for Intel HD)
seta r_maxDynamicLights "4"
seta r_ambientOcclusion "0"
seta r_volumetricLighting "0"

// Textures
seta r_maxTextureSize "1024"
seta r_useCompression "1"
seta r_skipMipMaps "0"

// Anti-aliasing (lightweight FXAA)
seta r_fxaa "1"
seta r_fxaaQuality "1"

// Post-processing (minimal)
seta r_bloom "1"
seta r_bloomIntensity "0.3"
seta r_motionBlur "0"
seta r_filmGrain "0"
seta r_chromaticAberration "0"
seta r_vignette "1"
seta r_vignetteIntensity "0.15"

// LOD (aggressive for performance)
seta r_lodDistance1 "128"
seta r_lodDistance2 "256"
seta r_lodDistance3 "512"
seta r_maxDecals "32"

// Effects
seta r_maxParticles "256"
seta r_particleLODDistance "256"

// Atmosphere
seta r_fogEnable "1"
seta r_fogDensity "0.003"

// ============================================================================
// AUDIO SETTINGS
// ============================================================================

seta s_volume_dB "0"
seta s_musicVolume_dB "-5"
seta s_channelCount "6"
seta s_device "default"

// ============================================================================
// INPUT SETTINGS (Keyboard + Mouse)
// ============================================================================

// Movement
bind "w" "_forward"
bind "s" "_back"
bind "a" "_moveleft"
bind "d" "_moveright"
bind "SPACE" "_jump"
bind "CTRL" "_crouch"
bind "SHIFT" "_speed"

// Combat
bind "MOUSE1" "_attack"
bind "MOUSE2" "_block"
bind "q" "_dodge"
bind "e" "_interact"
bind "r" "_reload"
bind "f" "_heavyAttack"

// Weapons
bind "1" "_impulse0"
bind "2" "_impulse1"
bind "3" "_impulse2"
bind "4" "_impulse3"
bind "5" "_impulse4"
bind "6" "_impulse5"
bind "7" "_impulse6"
bind "8" "_impulse7"
bind "MWHEELUP" "_impulse14"
bind "MWHEELDOWN" "_impulse15"

// System
bind "ESCAPE" "_impulse18"
bind "TAB" "_impulse19"
bind "F5" "savegame quick"
bind "F9" "loadgame quick"
bind "F12" "screenshot"

// Mouse
seta sensitivity "3.5"
seta m_smooth "1"
seta in_mouse "1"

// ============================================================================
// GAME SETTINGS
// ============================================================================

// Player
seta g_fov "100"
seta g_showHud "1"
seta g_crosshair "1"

// Combat
seta da_comboWindow "0.8"
seta da_parryWindow "0.3"
seta da_staminaRegenRate "15"
seta da_shieldBlockArc "60"
seta da_backstabMultiplier "3"
seta da_gloryKillEnabled "1"

// Difficulty
seta da_difficulty "1"

// UI
seta da_showComboCounter "1"
seta da_showStaminaBar "1"
seta da_showDamageNumbers "1"
seta da_subtitles "1"

// Performance HUD
seta com_showFPS "1"
seta com_showMemoryUsage "0"

// ============================================================================
// NETWORK (Disabled for single-player focus)
// ============================================================================

seta net_serverDedicated "0"
seta net_allowCheats "0"

// ============================================================================
// DARK AGES SPECIFIC
// ============================================================================

seta da_gameName "DOOM: The Dark Ages"
seta da_version "1.0.0"
seta da_maxSaveSlots "20"
seta da_autoSave "1"
seta da_autoSaveInterval "300"
seta da_showLevelStats "1"
seta da_enableTutorial "1"
